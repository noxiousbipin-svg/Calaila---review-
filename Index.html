<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calaila Boutique Stay</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#ffffff;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

padding:20px;

}

.container{

width:100%;

max-width:420px;

background:white;

border-radius:20px;

padding:35px;

text-align:center;

box-shadow:0 10px 35px rgba(0,0,0,0.12);

}

.logo{

width:140px;

margin-bottom:25px;

}

h1{

font-size:28px;

color:#0f6b6b;

margin-bottom:15px;

}

.subtitle{

font-size:18px;

color:#666;

margin-bottom:35px;

}

.stars{

display:flex;

justify-content:center;

gap:12px;

margin-bottom:30px;

}

.star{

font-size:48px;

cursor:pointer;

transition:.25s;

user-select:none;

}

.star:hover{

transform:scale(1.15);

}

.footer{

margin-top:25px;

font-size:14px;

color:#888;

}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Welcome to Calaila Boutique Stay</h1>

<p class="subtitle">

How was your stay?

</p>

<div class="stars">

<span class="star" data-rating="1">⭐</span>

<span class="star" data-rating="2">⭐</span>

<span class="star" data-rating="3">⭐</span>

<span class="star" data-rating="4">⭐</span>

<span class="star" data-rating="5">⭐</span>

</div>

<div class="footer">

Your feedback means the world to us ❤️

</div>

</div>

<script>
  const GOOGLE_REVIEW =
"https://search.google.com/local/writereview?placeid=ChIJ1WA0_A3vBTsR98Lss-FfdZY";

const stars = document.querySelectorAll(".star");

stars.forEach(star=>{

star.addEventListener("click",()=>{

const rating = Number(star.dataset.rating);

if(rating===5){

document.querySelector(".container").innerHTML=`

<h1 style="color:#0f6b6b;">
❤️ Thank You!
</h1>

<p style="font-size:18px;margin-top:20px;line-height:30px;">

We're delighted you enjoyed your stay.

<br><br>

Redirecting you to Google Reviews...

</p>

`;

setTimeout(()=>{

window.location.href=GOOGLE_REVIEW;

},1500);

}

else{

document.querySelector(".container").innerHTML=`

<h2 style="color:#0f6b6b;">
Thank you for your feedback.
</h2>

<p style="margin-top:20px;line-height:28px;">

We're sorry your experience wasn't perfect.

Please tell us how we can improve.

</p>

<br>

<textarea
id="feedback"
placeholder="Type your feedback here..."
style="width:100%;height:150px;padding:15px;border-radius:10px;border:1px solid #ddd;font-size:16px;"></textarea>

<br><br>

<button
onclick="submitFeedback()"
style="background:#0f6b6b;color:white;border:none;padding:15px 35px;border-radius:10px;font-size:17px;cursor:pointer;">

Submit Feedback

</button>

`;

}

});

});

  function submitFeedback(){

const feedback =
document.getElementById("feedback").value;

alert("Thank you for your feedback!");

/*
Future improvement:

You can connect this to:
- Google Forms
- Email
- Firebase
- Supabase
- Your own database

to actually store the feedback.

*/

document.querySelector(".container").innerHTML=`

<h1 style="color:#0f6b6b;">
❤️ Thank You
</h1>

<p style="font-size:18px;margin-top:25px;line-height:30px;">

Your feedback has been received.

We truly appreciate your time and hope to welcome you back to Calaila Boutique Stay.

Have a wonderful day!

</p>

`;

}

</script>

</body>

</html>
